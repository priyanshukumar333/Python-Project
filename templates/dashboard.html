<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 420px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            background: #0d6efd;
            color: white;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            padding: 15px;
            border-radius: 15px 15px 0 0;
        }

        .card-body {
            padding: 30px;
        }

        .info {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .btn {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="card-header">
            User Dashboard
        </div>

        <div class="card-body">

            <p class="info"><strong>Name:</strong> {{ user.name }}</p>

            <p class="info"><strong>Email:</strong> {{ user.email }}</p>

            <hr>

            <a href="/logout" class="btn btn-danger">
                Logout
            </a>

        </div>

    </div>

</body>

</html>
